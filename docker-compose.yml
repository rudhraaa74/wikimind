version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wikimind-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    networks:
      - wikimind-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: wikimind-frontend
    ports:
      - "5173:5173"
    environment:
      # React app running in browser needs to hit the nginx proxy (port 80) or locally /api
      - VITE_BACKEND_URL=/api
    networks:
      - wikimind-network
    restart: always
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

  nginx:
    image: nginx:alpine
    container_name: wikimind-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - wikimind-network
    restart: always

networks:
  wikimind-network:
    driver: bridge
